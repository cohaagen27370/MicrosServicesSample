syntax = "proto3";

package order_service;

import "google/protobuf/wrappers.proto";
import "google/protobuf/timestamp.proto";

message Order {
  google.protobuf.StringValue id = 1;
  google.protobuf.Timestamp orderDate = 2;
  repeated OrderedDog dogs = 3;
}

message OrderedDog {
  string id = 1;
  string name = 2;
  string idFromDogService = 3;
}

message AddOrderRequest {
  Order order = 1;
}

message OrderResponse {
  bool success = 1;
  google.protobuf.StringValue error = 2;
  string id = 3;
}

message AddDogInOrderRequest {
  string orderId = 1;
  string dogServiceId = 2;
}

message ListOrdersRequest {

}

message ListOrdersResponse {
  repeated Order orders = 1;
}

service OrderGrpcService {
  rpc AddOrder (AddOrderRequest) returns (OrderResponse);
  rpc AddDogInOrder (AddDogInOrderRequest) returns (OrderResponse);
  rpc ListOrders (ListOrdersRequest) returns (ListOrdersResponse);
}