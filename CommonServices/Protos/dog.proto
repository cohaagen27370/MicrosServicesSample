syntax = "proto3";

package dog_service;

import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

message Dog {
  google.protobuf.StringValue id = 1;
  string name = 2;
  string breed = 3;
  int32 age = 4;
}

message AddDogRequest {
  Dog dog = 1;
}

message DogResponse {
  bool success = 1;
  google.protobuf.StringValue error = 2;
  string id = 3;
}

message UpdateDogRequest {
  string id = 1;
  Dog dog = 2;
}

message DeleteDogRequest {
  string id = 1;
}

message GetDogRequest {
  string id = 1;
}

message ListDogsRequest {

}

message OneDogResponse {
  Dog dog = 1;
}

message ListDogsResponse {
  repeated Dog dogs = 1;
}


service DogService {
  rpc AddDog (AddDogRequest) returns (DogResponse);
  rpc UpdateDog (UpdateDogRequest) returns (DogResponse);
  rpc DeleteDog (DeleteDogRequest) returns (DogResponse);
  rpc ListDogs (ListDogsRequest) returns (ListDogsResponse);
  rpc GetOneDog (GetDogRequest) returns (OneDogResponse);
}